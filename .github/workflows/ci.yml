name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        env:
          PYTHONPATH: .
          DAN_AI_MODE: mock
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend when present
        run: |
          if [ -f frontend/DAN-react/package.json ]; then
            cd frontend/DAN-react
            npm ci
            npm run build
          elif [ -f frontend/package.json ]; then
            cd frontend
            npm ci
            npm run build
          else
            echo "No frontend package yet. Skipping frontend build."
          fi
